<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board Game Engine — Play</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">
</head>
<body>

<div class="game-page" id="game-page">

  <!-- Header -->
  <header class="game-header">
    <div>
      <span class="game-header-title" id="game-title">⚔ Board Game Engine</span>
      <span class="header-status" id="header-status" style="margin-left:12px"></span>
    </div>
    <div class="header-players" id="header-players"></div>
    <div style="display:flex;gap:8px;align-items:center">
      <button onclick="copyRoomLink()" style="background:var(--bg-panel);border:1px solid var(--border);color:var(--text-dim);border-radius:6px;padding:5px 12px;cursor:pointer;font-size:0.78rem;font-family:'Cinzel',serif" title="Copy room link">📋 Invite</button>
      <a href="index.html" style="color:var(--text-muted);font-size:0.78rem;text-decoration:none">← Lobby</a>
    </div>
  </header>

  <!-- Loading state -->
  <div id="loading-screen" class="loading">
    <div class="spinner"></div>
    <div id="loading-msg">Connecting…</div>
  </div>

  <!-- Host pre-game lobby -->
  <div id="host-lobby" style="display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:18px;padding:40px">
    <div style="font-family:'Cinzel',serif;color:var(--gold);font-size:1rem;letter-spacing:.12em">ROOM READY</div>
    <div style="font-size:0.82rem;color:var(--text-dim)">Share this link with friends:</div>
    <div id="lobby-link" onclick="copyRoomLink()" title="Click to copy"
         style="cursor:pointer;background:var(--bg-panel);border:1px solid var(--border);padding:10px 18px;border-radius:8px;font-size:0.78rem;max-width:500px;word-break:break-all"></div>
    <div id="lobby-players" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;min-height:28px"></div>
    <button class="btn btn-primary" onclick="hostStartGame()">▶ Start Game</button>
    <p style="font-size:0.75rem;color:var(--text-muted)">You can start alone or wait for others to join.</p>
  </div>

  <!-- Guest waiting screen -->
  <div id="guest-waiting" style="display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px">
    <div class="spinner"></div>
    <div style="color:var(--text-dim)">Connected — waiting for host to start…</div>
    <div id="guest-lobby-players" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;min-height:28px"></div>
  </div>

  <!-- Game container -->
  <div id="game-container" style="display:none"></div>

  <!-- Chat bar -->
  <div class="chat-panel" id="chat-panel" style="display:none">
    <div class="chat-log" id="chat-log" style="flex:1;max-height:60px;overflow-y:auto"></div>
    <input type="text" class="chat-input" id="chat-input" placeholder="Chat…" maxlength="120" onkeydown="if(event.key==='Enter')sendChat()">
    <button class="chat-send" onclick="sendChat()">Send</button>
  </div>

</div>

<script src="js/peerjs.min.js"></script>
<script src="js/engine.js"></script>
<script src="js/network.js"></script>
<script src="js/games/territory-wars.js"></script>
<script src="js/games/realms-edge.js"></script>

<script>
// ── Parse URL params + sessionStorage ────────────────────────────────────────
const params = new URLSearchParams(location.search);
const roomId  = params.get('room');
const gameId  = params.get('game') || sessionStorage.getItem('bge_game') || 'territory-wars';
const isHost  = params.get('host') === '1' || sessionStorage.getItem('bge_host') === '1';
const myName  = sessionStorage.getItem('bge_name') || 'Player';
const storedPlayers = JSON.parse(sessionStorage.getItem('bge_players') || 'null');

const game = window.GAMES[gameId];
if (!game) {
  document.getElementById('loading-msg').textContent = `Unknown game: ${gameId}`;
  throw new Error('Unknown game');
}

document.getElementById('game-title').textContent = `⚔ ${game.name}`;
document.title = `${game.name} — Board Game Engine`;

// ── Network & Engine ─────────────────────────────────────────────────────────
let network = null;
let engine  = null;
let myPlayerId = null;
let allPlayers = []; // list of {id, name, color}

const PLAYER_COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12'];

function setLoading(msg) {
  document.getElementById('loading-msg').textContent = msg;
}

function hideLoading() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('game-container').style.display = 'block';
  document.getElementById('chat-panel').style.display = 'flex';
}

function setHeaderStatus(msg, color = 'var(--text-dim)') {
  const el = document.getElementById('header-status');
  el.textContent = msg;
  el.style.color = color;
}

function renderHeaderPlayers() {
  document.getElementById('header-players').innerHTML = allPlayers.map((p, i) => `
    <span style="font-size:0.78rem;font-family:'Cinzel',serif;color:${p.color || PLAYER_COLORS[i]};padding:3px 10px;border:1px solid ${p.color || PLAYER_COLORS[i]}40;border-radius:20px">
      ${p.name}${p.id === myPlayerId ? ' (you)' : ''}
    </span>
  `).join('');
}

// ── Chat ─────────────────────────────────────────────────────────────────────
function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  network.sendChat(text, myName);
  input.value = '';
}

function appendChat(senderName, text) {
  const log = document.getElementById('chat-log');
  const line = document.createElement('div');
  line.className = 'chat-line';
  line.innerHTML = `<strong>${senderName}:</strong> ${text}`;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

// ── Host lobby helpers ────────────────────────────────────────────────────────
function renderLobbyPlayers() {
  document.getElementById('lobby-players').innerHTML = allPlayers.map((p, i) =>
    `<span style="font-size:0.82rem;color:${p.color || PLAYER_COLORS[i]};padding:3px 10px;border:1px solid ${(p.color || PLAYER_COLORS[i])}40;border-radius:16px">${p.name}${p.id === myPlayerId ? ' (you)' : ''}</span>`
  ).join('');
}

function hostStartGame() {
  document.getElementById('host-lobby').style.display = 'none';
  // Tell all connected guests who they are and that the game is starting
  allPlayers.forEach((p, i) => {
    if (i === 0) return; // skip host
    network.sendTo(p.id, { type: 'START_GAME', players: allPlayers, yourPlayerId: p.id });
  });
  startGame(allPlayers);
}

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  if (!roomId) {
    setLoading('No room ID. Go back to lobby.');
    return;
  }

  network = new P2PNetwork();

  // Chat handler
  network.onMessage = (msg, fromId) => {
    if (msg.type === 'CHAT') {
      appendChat(msg.senderName, msg.text);
      // If host, forward to others
      if (isHost) network.broadcast(msg);
    }
  };

  if (isHost) {
    setLoading('Setting up room…');
    try {
      const hostId = await network.createRoom(myName, roomId);
      myPlayerId = hostId;
      allPlayers = [{ id: hostId, name: myName, color: PLAYER_COLORS[0] }];
      renderHeaderPlayers();
      setHeaderStatus('Hosting · Room ' + hostId.slice(0,8) + '…', 'var(--gold)');

      // Show pre-game lobby; game starts when host clicks Start
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('host-lobby').style.display = 'flex';
      document.getElementById('lobby-link').textContent =
        `${location.origin}${location.pathname}?room=${roomId}&game=${gameId}`;
      renderLobbyPlayers();

      network.onPlayerJoined = (p) => {
        const color = PLAYER_COLORS[allPlayers.length % PLAYER_COLORS.length];
        const guest = { id: p.peerId, name: p.name, color };
        allPlayers.push(guest);
        renderHeaderPlayers();
        renderLobbyPlayers();
        setHeaderStatus(`${p.name} joined`, 'var(--green)');
        setTimeout(() => setHeaderStatus('Hosting', 'var(--gold)'), 3000);
        if (engine?.state) {
          // Game already running — add guest as new player and sync state
          engine.state.players.push(guest);
          network.sendTo(p.peerId, { type: 'STATE_UPDATE', state: engine.state, yourPlayerId: p.peerId });
          network.broadcast({ type: 'STATE_UPDATE', state: engine.state });
        } else {
          // Still in lobby — tell guest who they are and who's waiting
          network.sendTo(p.peerId, { type: 'LOBBY_UPDATE', players: allPlayers, yourPlayerId: p.peerId });
        }
      };

      network.onMessage = (msg, fromId) => {
        if (msg.type === 'ACTION' && engine) {
          engine._processAction(msg.action);
        } else if (msg.type === 'CHAT') {
          appendChat(msg.senderName, msg.text);
          network.broadcast(msg);
        }
      };

    } catch(e) {
      setLoading('Failed to create room: ' + e.message);
    }

  } else {
    // Guest
    setLoading('Connecting to room…');
    network.onRetry = (attempt, max) => setLoading(`Connecting… (attempt ${attempt}/${max})`);
    try {
      const myId = await network.joinRoom(roomId, myName);
      myPlayerId = myId;
      setHeaderStatus('Connected · Room ' + roomId.slice(0,8) + '…', 'var(--green)');

      // Show guest waiting screen
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('guest-waiting').style.display = 'flex';

      network.onMessage = (msg, fromId) => {
        if (msg.type === 'LOBBY_UPDATE') {
          // Host told us who we are while waiting in lobby
          myPlayerId = msg.yourPlayerId;
          allPlayers = msg.players;
          renderHeaderPlayers();
          document.getElementById('guest-lobby-players').innerHTML = msg.players.map((p, i) =>
            `<span style="font-size:0.82rem;color:${p.color || PLAYER_COLORS[i]};padding:3px 10px;border:1px solid ${(p.color || PLAYER_COLORS[i])}40;border-radius:16px">${p.name}${p.id === myPlayerId ? ' (you)' : ''}</span>`
          ).join('');
        } else if (msg.type === 'START_GAME') {
          // Host started — our player slot is msg.yourPlayerId
          myPlayerId = msg.yourPlayerId || myPlayerId;
          document.getElementById('guest-waiting').style.display = 'none';
          startGame(msg.players);
        } else if (msg.type === 'STATE_UPDATE' || msg.type === 'GAME_OVER') {
          if (msg.yourPlayerId) myPlayerId = msg.yourPlayerId;
          if (!engine) {
            document.getElementById('guest-waiting').style.display = 'none';
            startGame(msg.state.players, msg.state);
          } else {
            engine._handleNetworkMessage(msg, fromId);
          }
        } else if (msg.type === 'CHAT') {
          appendChat(msg.senderName, msg.text);
        }
      };

    } catch(e) {
      setLoading('Could not connect. Room may not exist or host left.');
    }
  }
}

function startGame(players, existingState = null) {
  allPlayers = players;
  renderHeaderPlayers();
  hideLoading();

  const container = document.getElementById('game-container');

  // Find my player id that matches a player
  // For host: myPlayerId = roomId (PeerJS id)
  // For guest: need to figure out which player slot
  const matchedPlayer = players.find(p => p.id === myPlayerId || p.name === myName);
  const effectiveId = matchedPlayer?.id || players[0]?.id;

  engine = new BoardGameEngine({
    game,
    network,
    container,
    playerId: effectiveId,
    isHost
  });

  engine.on('log', entry => {
    if (engine.state) {
      engine.state.log = engine.state.log || [];
      engine.state.log.push(entry.msg);
    }
  });

  engine.on('gameover', winner => {
    setHeaderStatus(`🏆 ${winner?.name} wins!`, 'var(--gold)');
  });

  engine.on('invalid-action', result => {
    setHeaderStatus(result.reason || 'Invalid action', 'var(--red)');
    setTimeout(() => setHeaderStatus(''), 2000);
  });

  if (isHost && !existingState) {
    engine.startGame(players);
  } else if (existingState) {
    engine.state = existingState;
    engine.forceRender();
  }
}

function copyRoomLink() {
  const link = `${location.origin}${location.pathname.replace('play.html','index.html')}?room=${roomId}&game=${gameId}`;
  navigator.clipboard.writeText(link).then(() => {
    setHeaderStatus('Link copied!', 'var(--green)');
    setTimeout(() => setHeaderStatus(''), 2000);
  });
}

init();
</script>
</body>
</html>
