<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board Game Engine — Lobby</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">
</head>
<body>

<main class="lobby-page">
  <header class="lobby-header">
    <div class="lobby-logo">⚔ Board Game Engine</div>
    <div class="lobby-subtitle">Multiplayer • Peer-to-Peer • No Server Required</div>
    <div class="gold-divider"></div>
  </header>

  <!-- Game Selection -->
  <section style="width:100%; max-width:900px; margin-bottom:32px;">
    <h2 style="font-family:'Cinzel',serif; color:var(--gold-dim); font-size:0.8rem; letter-spacing:0.15em; text-align:center; margin-bottom:20px;">CHOOSE A GAME</h2>
    <div class="games-grid" id="games-grid">
      <!-- Populated by JS -->
    </div>
  </section>

  <!-- Create / Join panels -->
  <div class="lobby-panels" id="lobby-panels">

    <!-- CREATE ROOM -->
    <div class="lobby-panel">
      <h2>⚔ Create Room</h2>
      <input type="text" id="host-name" placeholder="Your name" maxlength="20">
      <button class="btn btn-primary" id="btn-create" onclick="createRoom()">Create & Get Link</button>

      <div id="room-created" style="display:none; margin-top:16px;">
        <p style="font-size:0.82rem; color:var(--text-dim); margin-bottom:6px;">Share this link with friends:</p>
        <div class="room-link-box" id="room-link-display" onclick="copyLink(this)"></div>
        <p class="copy-hint">Click to copy · Share with up to 3 friends</p>
        <div id="waiting-players" style="margin-top:16px;">
          <p style="font-size:0.85rem; color:var(--text-dim); margin-bottom:8px;">Players in room:</p>
          <ul class="player-list" id="player-list-host"></ul>
        </div>
        <button class="btn btn-primary" id="btn-start" onclick="startGame()" disabled>Start Game</button>
        <p class="status-msg status-info" id="start-status">Waiting for at least 1 more player…</p>
      </div>
      <p class="status-msg" id="create-status"></p>
    </div>

    <!-- JOIN ROOM -->
    <div class="lobby-panel">
      <h2>🚪 Join Room</h2>
      <input type="text" id="join-name" placeholder="Your name" maxlength="20">
      <input type="text" id="join-code" placeholder="Room ID or paste link">
      <button class="btn btn-secondary" id="btn-join" onclick="joinRoom()">Join Game</button>
      <p class="status-msg" id="join-status"></p>
    </div>

  </div>

</main>

<script src="js/games/territory-wars.js"></script>
<script src="js/games/realms-edge.js"></script>

<script>
// ── Available games ─────────────────────────────────────────────────────────
const GAME_LIST = [
  { id: 'realms-edge',    obj: window.GAMES['realms-edge'] },
  { id: 'territory-wars', obj: window.GAMES['territory-wars'] },
  { id: 'monopoly',       obj: null, comingSoon: true, name: 'Monopoly-style', icon: '🎩', desc: 'Coming soon.' },
  { id: 'your-game',      obj: null, comingSoon: true, name: 'Your Custom Game', icon: '🃏', desc: 'Plug in your own game definition.' },
];
let selectedGameId = 'realms-edge';
let hostPlayers = [];
let myName = '';
const PLAYER_COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12'];

// ── Render game cards ───────────────────────────────────────────────────────
function renderGameCards() {
  const grid = document.getElementById('games-grid');
  grid.innerHTML = GAME_LIST.map(g => {
    const game = g.obj || {};
    const name = g.name || game.name || g.id;
    const icon = g.icon || game.icon || '🎲';
    const desc = g.desc || game.description || '';
    const cs   = g.comingSoon;
    return `
      <div class="game-card ${g.id === selectedGameId ? 'selected' : ''} ${cs ? '' : ''}" 
           onclick="${cs ? '' : `selectGame('${g.id}')`}"
           style="${cs ? 'opacity:0.5;cursor:not-allowed' : 'cursor:pointer'}">
        ${cs ? `<div class="coming-soon">SOON</div>` : ''}
        <div class="game-card-icon">${icon}</div>
        <div class="game-card-name">${name}</div>
        <div class="game-card-desc">${desc}</div>
      </div>
    `;
  }).join('');
}

function selectGame(id) {
  selectedGameId = id;
  renderGameCards();
}

renderGameCards();

// ── CREATE ROOM ─────────────────────────────────────────────────────────────
function createRoom() {
  myName = document.getElementById('host-name').value.trim() || 'Host';
  const roomId = Math.random().toString(36).slice(2, 10);
  sessionStorage.setItem('bge_room', roomId);
  sessionStorage.setItem('bge_name', myName);
  sessionStorage.setItem('bge_host', '1');
  sessionStorage.setItem('bge_game', selectedGameId);
  // Go to play.html immediately so the PeerJS peer is created right away,
  // allowing guests to join before the host explicitly starts the game.
  window.location.href = `play.html?room=${roomId}&game=${selectedGameId}&host=1`;
}

function renderHostPlayerList() {
  const ul = document.getElementById('player-list-host');
  ul.innerHTML = hostPlayers.map((p, i) => `
    <li>
      <span class="player-dot" style="background:${PLAYER_COLORS[i]}"></span>
      ${p.name} ${p.isHost ? '<span style="font-size:0.75rem;color:var(--text-dim)">(you, host)</span>' : ''}
    </li>
  `).join('');
}

function updateStartButton() {
  const btn = document.getElementById('btn-start');
  const status = document.getElementById('start-status');
  btn.disabled = false;
  status.textContent = 'Share the link above, then start when ready. Others join from play.html.';
  sessionStorage.setItem('bge_players', JSON.stringify(hostPlayers));
}

function startGame() {
  sessionStorage.setItem('bge_players', JSON.stringify(hostPlayers));
  const roomId = sessionStorage.getItem('bge_room');
  window.location.href = `play.html?room=${roomId}&game=${selectedGameId}&host=1`;
}

function copyLink(el) {
  navigator.clipboard.writeText(el.textContent.trim()).then(() => {
    const orig = el.textContent;
    el.textContent = '✅ Copied!';
    setTimeout(() => el.textContent = orig, 1800);
  });
}

// ── JOIN ROOM ────────────────────────────────────────────────────────────────
function joinRoom() {
  myName = document.getElementById('join-name').value.trim() || 'Guest';
  let code = document.getElementById('join-code').value.trim();

  // Extract room ID from full link if pasted
  const match = code.match(/[?&]room=([^&]+)/);
  if (match) code = match[1];

  const gameMatch = document.getElementById('join-code').value.match(/[?&]game=([^&]+)/);
  const gameId = gameMatch ? gameMatch[1] : selectedGameId;

  if (!code) {
    setJoinStatus('Enter a Room ID or paste the link', 'err');
    return;
  }

  sessionStorage.setItem('bge_room', code);
  sessionStorage.setItem('bge_name', myName);
  sessionStorage.setItem('bge_host', '0');
  sessionStorage.setItem('bge_game', gameId);
  // The actual P2P connection happens in play.html
  window.location.href = `play.html?room=${code}&game=${gameId}`;
}

function setJoinStatus(msg, type) {
  const el = document.getElementById('join-status');
  el.textContent = msg;
  el.className = `status-msg status-${type}`;
}

// Auto-fill join code from URL
const urlRoom = new URLSearchParams(location.search).get('room');
if (urlRoom) {
  document.getElementById('join-code').value = location.href;
}
</script>
</body>
</html>
